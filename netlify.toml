[build]
  command       = "npm run build"
  publish       = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"

# Single-page app: serve index.html for all routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
